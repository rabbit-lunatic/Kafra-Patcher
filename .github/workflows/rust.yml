name: Rust CI + Release

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build (Release)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose

      - name: Prepare Release Files
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          mkdir dist
          copy target\release\kpatcher.exe dist\KPatcher.exe
          copy target\release\mkpatch.exe dist\mkpatch.exe
          copy examples\kpatcher.yml dist\
          copy examples\patch.yml dist\
          xcopy examples\bootstrap dist\bootstrap /E /I

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
